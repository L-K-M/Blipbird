# CD: tag-triggered release. scripts/release.sh bumps versionName (and
# auto-increments versionCode) in app/build.gradle.kts, commits, tags vX.Y.Z,
# and with --push pushes branch + tag — the tag push lands here, which:
#
#   - re-proves the tagged commit (tests + lint): a tag on a broken commit
#     must not publish
#   - asserts the tag matches the committed versionName — the APK is built
#     from the committed version, so a mismatched tag would ship a build
#     labeled with a version it isn't
#   - requires all four signing secrets (ANDROID_KEYSTORE_BASE64 /
#     ANDROID_KEYSTORE_PASSWORD / ANDROID_KEY_ALIAS / ANDROID_KEY_PASSWORD)
#     before building; a tag must never publish an unsigned APK
#   - signs the release APK, verifies its signature and certificate with the
#     selected Android SDK apksigner, and generates a SHA-256 checksum
#   - publishes the signed APK and checksum in a GitHub Release

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release and upload the APK

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - name: Validate release signing configuration
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          missing=()
          for name in \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -ne 0 ]; then
            echo "::error::Release signing is not fully configured; missing secrets: ${missing[*]}"
            exit 1
          fi

      - uses: gradle/actions/wrapper-validation@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v6

      - name: Match tag to committed versionName
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Same tolerant pattern the lkm-release engine uses to read/bump the
          # line (flexible spacing, trailing comments allowed) — the gate must
          # accept everything the bumper can produce.
          COMMITTED="$(sed -nE 's/^[[:space:]]*versionName[[:space:]]*=[[:space:]]*"([^"]*)".*$/\1/p' app/build.gradle.kts | head -n 1)"
          if [ "$VERSION" != "$COMMITTED" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match versionName ${COMMITTED} in app/build.gradle.kts — cut releases with scripts/release.sh so they stay in step."
            exit 1
          fi

      - name: Test and lint the tagged commit
        run: ./gradlew testDebugUnitTest lintDebug

      - name: Assemble release APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        id: sign
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          UNSIGNED="app/build/outputs/apk/release/app-release-unsigned.apk"
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [ -z "$SDK_ROOT" ]; then
            echo "::error::Neither ANDROID_SDK_ROOT nor ANDROID_HOME is set."
            exit 1
          fi
          BUILD_TOOLS_DIRS=("$SDK_ROOT"/build-tools/*)
          if [ ! -d "${BUILD_TOOLS_DIRS[0]}" ]; then
            echo "::error::No Android SDK Build Tools installation found under $SDK_ROOT."
            exit 1
          fi
          BUILD_TOOLS="$(printf '%s\n' "${BUILD_TOOLS_DIRS[@]}" | sort -V | tail -n 1)"
          ZIPALIGN="$BUILD_TOOLS/zipalign"
          APKSIGNER="$BUILD_TOOLS/apksigner"
          if [ ! -x "$ZIPALIGN" ] || [ ! -x "$APKSIGNER" ]; then
            echo "::error::Selected Android SDK Build Tools are missing zipalign or apksigner: $BUILD_TOOLS"
            exit 1
          fi
          echo "Using Android SDK Build Tools ${BUILD_TOOLS##*/} for APK signing and verification."

          ALIGNED="aligned.apk"
          OUT="blipbird-${GITHUB_REF_NAME}.apk"
          CHECKSUM="${OUT}.sha256"
          trap 'rm -f keystore.jks "$ALIGNED"' EXIT

          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > keystore.jks
          "$ZIPALIGN" -p -f 4 "$UNSIGNED" "$ALIGNED"
          "$APKSIGNER" sign \
            --ks keystore.jks \
            --ks-pass "pass:$ANDROID_KEYSTORE_PASSWORD" \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --key-pass "pass:$ANDROID_KEY_PASSWORD" \
            --out "$OUT" "$ALIGNED"
          "$APKSIGNER" verify --verbose --print-certs "$OUT"
          sha256sum "$OUT" > "$CHECKSUM"
          echo "apk=$OUT" >> "$GITHUB_OUTPUT"
          echo "checksum=$CHECKSUM" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Blipbird ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            ${{ steps.sign.outputs.apk }}
            ${{ steps.sign.outputs.checksum }}
