# CD: tag-triggered release. scripts/release.sh bumps versionName (and
# auto-increments versionCode) in app/build.gradle.kts, commits, tags vX.Y.Z,
# and with --push pushes branch + tag — the tag push lands here, which:
#
#   - re-proves the tagged commit (tests + lint): a tag on a broken commit
#     must not publish
#   - asserts the tag matches the committed versionName — the APK is built
#     from the committed version, so a mismatched tag would ship a build
#     labeled with a version it isn't
#   - builds the release APK and signs it with the upload keystore from
#     secrets (ANDROID_KEYSTORE_BASE64 / ANDROID_KEYSTORE_PASSWORD /
#     ANDROID_KEY_ALIAS / ANDROID_KEY_PASSWORD), falling back to attaching
#     the unsigned APK with a warning while no keystore is configured
#   - publishes a GitHub Release with generated notes

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release and upload the APK

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - uses: gradle/actions/wrapper-validation@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v5

      - name: Match tag to committed versionName
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Same tolerant pattern the lkm-release engine uses to read/bump the
          # line (flexible spacing, trailing comments allowed) — the gate must
          # accept everything the bumper can produce.
          COMMITTED="$(sed -nE 's/^[[:space:]]*versionName[[:space:]]*=[[:space:]]*"([^"]*)".*$/\1/p' app/build.gradle.kts | head -n 1)"
          if [ "$VERSION" != "$COMMITTED" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match versionName ${COMMITTED} in app/build.gradle.kts — cut releases with scripts/release.sh so they stay in step."
            exit 1
          fi

      - name: Test and lint the tagged commit
        run: ./gradlew testDebugUnitTest lintDebug

      - name: Assemble release APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        id: sign
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          UNSIGNED="app/build/outputs/apk/release/app-release-unsigned.apk"

          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            OUT="blipbird-${GITHUB_REF_NAME}-unsigned.apk"
            cp "$UNSIGNED" "$OUT"
            echo "::warning::No ANDROID_KEYSTORE_BASE64 secret set; attaching the unsigned release APK."
            echo "apk=$OUT" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BUILD_TOOLS="$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -n1)"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > keystore.jks
          ALIGNED="aligned.apk"
          OUT="blipbird-${GITHUB_REF_NAME}.apk"
          "$BUILD_TOOLS/zipalign" -p -f 4 "$UNSIGNED" "$ALIGNED"
          "$BUILD_TOOLS/apksigner" sign \
            --ks keystore.jks \
            --ks-pass "pass:$ANDROID_KEYSTORE_PASSWORD" \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --key-pass "pass:$ANDROID_KEY_PASSWORD" \
            --out "$OUT" "$ALIGNED"
          rm -f keystore.jks "$ALIGNED"
          echo "apk=$OUT" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Blipbird ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: ${{ steps.sign.outputs.apk }}
