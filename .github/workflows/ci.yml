# CI: prove every push to main and every PR — unit tests, Android lint, and a
# debug APK uploaded as a rolling artifact.
#
# Hardening (family contract):
#   - least-privilege token (contents: read)
#   - cancel superseded PR runs, but never an in-progress main run — a
#     permanently "cancelled" main commit masks breakage and breaks bisection
#   - timeout on every job so a wedged Gradle daemon can't burn runner hours

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      # Supply-chain gate: reject a tampered gradle-wrapper.jar.
      - uses: gradle/actions/wrapper-validation@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      # No explicit SDK install step: the ubuntu runner image ships the Android
      # SDK, and AGP resolves compileSdk android-37.0 against it (paired with
      # android.suppressUnsupportedCompileSdk in gradle.properties).
      - uses: gradle/actions/setup-gradle@v5

      - name: Test, lint, and assemble
        run: ./gradlew testDebugUnitTest lintDebug assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v6
        with:
          name: blipbird-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
