name: GLM 5.2 PR Review

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: write
  issues: write

# One review per PR at a time; superseded reviews of an outdated diff are
# worthless, so cancel them. Keyed on the PR number — for pull_request_target
# github.ref is the base branch, which would collide across PRs.
concurrency:
  group: zai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Review PR with GLM 5.2
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.event.pull_request.draft == false }}
    env:
      ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
    steps:
      - name: Z.ai Code Review
        if: ${{ env.ZAI_API_KEY != '' }}
        uses: L-K-M/zai-code-review@main
        with:
          ZAI_API_KEY: ${{ env.ZAI_API_KEY }}
          ZAI_MODEL: glm-5.2
          ZAI_REVIEWER_NAME: GLM 5.2 Code Review
          GITHUB_TOKEN: ${{ github.token }}

      - name: Skip when Z.ai API key is unavailable
        if: ${{ env.ZAI_API_KEY == '' }}
        run: echo "Skipping Z.ai review because ZAI_API_KEY is not configured."
